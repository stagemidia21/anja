<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Anja — Sem conexão</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100dvh;
      background: #1A1814;
      color: #F5F0E8;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: rgba(196,164,100,0.1);
      border: 1px solid rgba(196,164,100,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }
    h1 { font-size: 1.25rem; font-weight: 600; }
    p { font-size: 0.875rem; color: #8A8070; line-height: 1.6; max-width: 280px; }
    button {
      margin-top: 8px;
      background: #C4A464;
      color: #1A1814;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">
    <svg width="28" height="28" fill="none" stroke="#C4A464" stroke-width="1.5" viewBox="0 0 24 24">
      <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <h1>Sem conexão</h1>
  <p>Verifique sua internet e tente novamente.</p>
  <button onclick="window.location.reload()">Tentar novamente</button>
</body>
</html>
